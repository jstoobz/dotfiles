name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck \
            bootstrap.sh \
            install \
            lib/*.sh \
            scripts/*.sh \
            scripts/macos/*.sh \
            hooks/pre-commit
