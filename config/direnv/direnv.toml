# Direnv configuration
# https://direnv.net/man/direnv.toml.1.html

[global]
# Warn when .envrc takes longer than this to load
warn_timeout = "5s"

# Don't show the loading message
hide_env_diff = true

[whitelist]
# Automatically trust .envrc files in these directories
prefix = [
    "~/.stoobz",
    "~/repos",
]
